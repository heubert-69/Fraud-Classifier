version: "3.9"
services:
  backend:
    build: ./ML_utils
    container_name: finai_api_container
    ports:
      - "8000:8000"
    restart: always

  frontend:
    build: ./src
    container_name: finai_frontend
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://8080:8080
    depends_on:
      - ML_utils
